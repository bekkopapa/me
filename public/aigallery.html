<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Artwork Gallery | sohyunsoo.com</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500&family=VT323&display=swap');
    body { font-family: 'Noto Serif KR', serif; }
    .pixel-font { font-family: 'VT323', monospace; }
    .gallery-columns {
      column-count: 1;
      column-gap: 1.5rem;
    }
    @media (min-width: 640px) { .gallery-columns { column-count: 2; } }
    @media (min-width: 1024px) { .gallery-columns { column-count: 3; } }
    @media (min-width: 1280px) { .gallery-columns { column-count: 4; } }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1.5rem;
    }
    .active {
      opacity: 1 !important;
      visibility: visible !important;
    }
  </style>
</head>
<body class="bg-[#fafafc] text-gray-800 select-none">

  <!-- 헤더 (고정) -->
  <header id="header" class="fixed top-0 left-0 w-full bg-[#fafafc]/90 backdrop-blur shadow-sm z-40 transition-all duration-300 h-32 flex flex-col justify-center items-center overflow-hidden">
    <div class="absolute left-4 top-6">
      <a href="index.html" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition">HOME</a>
    </div>
    <div class="absolute right-4 top-6">
      <a href="https://cafe.naver.com/stablediffusionlab" target="_blank" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-full transition">CAFE</a>
    </div>
    <h1 class="pixel-font text-4xl text-gray-600 mb-1 cursor-pointer hover:opacity-70 transition" onclick="window.scrollTo({top:0, behavior:'smooth'})">AI Artwork Gallery</h1>
    <p class="text-[10px] md:text-xs text-center font-semibold leading-tight text-gray-500">
      소현수 작가의 작품 속 캐릭터의 아트워크를 전시합니다.<br>
      An exhibition of character artwork from the novel.
    </p>
  </header>

  <!-- 메인 갤러리 -->
  <main class="container mx-auto px-4 mt-40 mb-20">
    <div id="gallery-container" class="gallery-columns">
      <div class="text-center py-20 text-gray-400 animate-pulse w-full col-span-full">Loading masterpiece...</div>
    </div>
  </main>

  <!-- 상세 모달 -->
  <div id="art-modal" class="fixed inset-0 bg-black/95 z-50 opacity-0 invisible transition-all duration-300 flex items-center justify-center p-4">
    <button id="close-modal" class="absolute top-6 right-6 text-white text-4xl hover:scale-110 transition">&times;</button>
    <div class="max-w-5xl w-full flex flex-col md:flex-row bg-[#f5f5dc] rounded-lg overflow-hidden shadow-2xl">
      <div id="modal-media-container" class="w-full md:w-2/3 bg-black flex items-center justify-center min-h-[300px]">
        <!-- 이미지 또는 비디오 -->
      </div>
      <div class="w-full md:w-1/3 p-6 flex flex-col">
        <h2 id="modal-title" class="text-xl font-bold bg-black text-white p-3 text-center mb-4 rounded"></h2>
        <div id="modal-content" class="text-gray-700 leading-relaxed text-sm flex-grow overflow-y-auto max-h-[300px] md:max-h-full"></div>
        <div class="mt-6 flex justify-between items-center border-t border-gray-300 pt-4">
          <button id="share-btn" class="bg-black text-white px-4 py-2 rounded text-xs hover:opacity-80 transition">SHARE</button>
          <span class="text-[10px] text-gray-400 font-mono">sohyunsoo.com</span>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center py-10 border-t border-gray-200">
    <p class="text-xs text-gray-400">&copy; 2023-26 sohyunsoo.com | Powered by Firebase & Stable Diffusion</p>
  </footer>

  <!-- Firebase & Logic -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      projectId: "sohyunsoo-2026",
      appId: "1:664222823154:web:835cabbaaddc98a841d66b",
      storageBucket: "sohyunsoo-2026.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const container = document.getElementById('gallery-container');
    const modal = document.getElementById('art-modal');
    const header = document.getElementById('header');

    async function loadGallery() {
      try {
        const q = query(collection(db, "ai_gallery"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        container.innerHTML = '';
        
        snapshot.forEach(doc => {
          const item = doc.data();
          const el = document.createElement('div');
          el.className = 'gallery-item group cursor-pointer overflow-hidden rounded-lg shadow-md hover:shadow-2xl transition-all duration-500 hover:-translate-y-1';
          
          if (item.type === 'video') {
            el.innerHTML = `
              <video src="${item.mediaUrl}" muted loop autoplay playsinline class="w-full h-auto grayscale group-hover:grayscale-0 transition-all duration-700"></video>
              <div class="p-2 bg-white/80 text-[10px] font-bold text-gray-500 uppercase tracking-tighter">Video Work</div>
            `;
          } else {
            el.innerHTML = `<img src="${item.mediaUrl}" loading="lazy" class="w-full h-auto grayscale group-hover:grayscale-0 transition-all duration-700">`;
          }

          el.onclick = () => openModal(item);
          container.appendChild(el);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = '<div class="text-center py-20 text-red-400">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function openModal(item) {
      const mediaContainer = document.getElementById('modal-media-container');
      const title = document.getElementById('modal-title');
      const content = document.getElementById('modal-content');

      title.innerText = item.title;
      content.innerText = item.content;
      
      if (item.type === 'video') {
        mediaContainer.innerHTML = `<video src="${item.mediaUrl}" controls autoplay loop class="max-w-full max-h-[80vh]"></video>`;
      } else {
        mediaContainer.innerHTML = `<img src="${item.mediaUrl}" class="max-w-full max-h-[80vh] object-contain">`;
      }

      modal.classList.remove('invisible');
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('close-modal').onclick = () => {
      modal.classList.remove('active');
      modal.classList.add('invisible');
      document.body.style.overflow = 'auto';
      document.getElementById('modal-media-container').innerHTML = '';
    };

    window.addEventListener('scroll', () => {
      const scroll = window.scrollY;
      const newHeight = Math.max(128 - scroll, 60);
      header.style.height = `${newHeight}px`;
    });

    loadGallery();
  </script>
</body>
</html>
